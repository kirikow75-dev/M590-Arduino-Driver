name: Compile Arduino Examples

on: [push, pull_request]

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: arduino/setup-arduino-cli@v2

      - name: Install AVR core
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr

      - name: Install this library
        run: |
          mkdir -p ~/Arduino/libraries
          cp -r $GITHUB_WORKSPACE ~/Arduino/libraries/M590Driver

      - name: Compile examples
        run: |
          arduino-cli compile --fqbn arduino:avr:uno ~/Arduino/libraries/M590Driver/examples/BasicUsage
          arduino-cli compile --fqbn arduino:avr:uno ~/Arduino/libraries/M590Driver/examples/SendSMS
          arduino-cli compile --fqbn arduino:avr:uno ~/Arduino/libraries/M590Driver/examples/ReceiveSMS
          arduino-cli compile --fqbn arduino:avr:uno ~/Arduino/libraries/M590Driver/examples/SendCall
          arduino-cli compile --fqbn arduino:avr:uno ~/Arduino/libraries/M590Driver/examples/ReceiveCall
          arduino-cli compile --fqbn arduino:avr:uno ~/Arduino/libraries/M590Driver/examples/UserCommands
          arduino-cli compile --fqbn arduino:avr:uno ~/Arduino/libraries/M590Driver/examples/SleepMode
          arduino-cli compile --fqbn arduino:avr:uno ~/Arduino/libraries/M590Driver/examples/HardwareReset
          arduino-cli compile --fqbn arduino:avr:uno ~/Arduino/libraries/M590Driver/examples/FullInit
